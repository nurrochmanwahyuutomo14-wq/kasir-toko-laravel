<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kasir Offline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; background: #f0f4f8; overflow-x: hidden; }
    button, input, select { min-height: 52px; font-size: 17px; font-weight: 700; }
    
    /* Bottom Navigation */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 2px solid #e5e7eb; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
    .bottom-nav button { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 0; color: #9ca3af; border: none; background: none; min-height: 64px; border-top: 3px solid transparent; }
    .bottom-nav button.active { color: #1d4ed8; border-top-color: #1d4ed8; background: #eff6ff; }
    .bottom-nav span.icon { font-size: 24px; }
    .bottom-nav span.label { font-size: 11px; font-weight: 800; text-transform: uppercase; }

    /* Layout View */
    .view-container { display: none; padding: 16px; min-height: 100vh; padding-bottom: 120px; }
    .view-container.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Hide scrollbar */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <!-- VIEW: DASHBOARD -->
  <div id="view-dashboard" class="view-container active">
    <div class="bg-gradient-to-br from-blue-800 to-blue-600 rounded-[20px] p-6 text-white mb-5 shadow-lg">
      <h1 class="text-2xl font-black mb-1">🏪 Kasir Toko (Offline)</h1>
      <p class="opacity-80 text-sm" id="current-date">Sistem siap digunakan.</p>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-5">
      <div class="col-span-2 bg-white rounded-[18px] p-4 shadow-sm border-t-4 border-green-600">
        <p class="text-xs font-bold text-gray-500 uppercase">Omzet Hari Ini</p>
        <p class="text-3xl font-black text-green-700" id="dash-omzet">Rp 0</p>
      </div>
      <div class="bg-white rounded-[18px] p-4 shadow-sm border-t-4 border-blue-600">
        <p class="text-xs font-bold text-gray-500 uppercase">Transaksi</p>
        <p class="text-2xl font-black text-blue-700" id="dash-trx">0 Nota</p>
      </div>
      <div class="bg-white rounded-[18px] p-4 shadow-sm border-t-4 border-red-500">
        <p class="text-xs font-bold text-gray-500 uppercase">Barang Keluar</p>
        <p class="text-2xl font-black text-red-600" id="dash-items">0 Pcs</p>
      </div>
    </div>
    <button onclick="navigate('kasir')" class="w-full bg-blue-600 outline-none text-white font-black py-4 rounded-[16px] shadow-lg mb-3">💻 BUKA KASIR</button>
  </div>

  <!-- VIEW: GUDANG BARANG -->
  <div id="view-barang" class="view-container">
    <div class="flex justify-between items-center bg-white p-5 rounded-[20px] shadow-sm mb-4">
      <h2 class="text-xl font-black">📦 Master Barang</h2>
      <button onclick="MainApp.openAddProduct()" class="bg-blue-600 text-white font-black px-4 py-2 rounded-xl">+ BARANG</button>
    </div>
    <div id="product-list" class="space-y-3"></div>
  </div>

  <!-- VIEW: KASIR -->
  <div id="view-kasir" class="view-container">
    <input type="text" id="kasir-search" placeholder="🔍 Cari Barang / Scan Barcode..." class="w-full p-4 border-2 border-gray-200 rounded-xl mb-3 outline-none" oninput="MainApp.filterKasirProducts(this.value)">
    <div id="kasir-product-list" class="grid grid-cols-1 gap-3"></div>
    <div class="h-32"></div>
    
    <!-- Floating Cart Base Kasir -->
    <div class="fixed bottom-[84px] left-0 right-0 px-3 z-50">
      <button onclick="MainApp.toggleCartDrawer()" class="w-full bg-blue-700 text-white rounded-[18px] p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
          <span class="text-2xl">🛒 <span id="cart-badge" class="absolute -mt-2 -ml-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span></span>
          <div class="text-left leading-tight">
            <p class="text-lg font-black" id="cart-total">Rp 0</p>
          </div>
        </div>
        <span class="font-black text-lg">PROSES →</span>
      </button>
    </div>
  </div>

  <!-- CART DRAWER -->
  <div id="cart-drawer" class="fixed inset-0 bg-black/60 z-[150] hidden flex-col justify-end">
    <div class="bg-white rounded-t-[24px] w-full max-h-[85vh] flex flex-col">
      <div class="p-4 border-b flex justify-between items-center">
        <h2 class="text-xl font-black">🛒 Keranjang</h2>
        <div class="flex gap-2">
          <button onclick="MainApp.clearCart()" class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm">Bersihkan</button>
          <button onclick="MainApp.toggleCartDrawer()" class="text-gray-500 text-2xl font-black w-8 h-8 rounded-full bg-gray-100">&times;</button>
        </div>
      </div>
      <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
      <div class="p-4 border-t bg-gray-50">
        <div class="flex justify-between items-center mb-3">
          <span class="font-bold text-gray-500">TOTAL</span>
          <span class="text-2xl font-black text-blue-700" id="drawer-total">Rp 0</span>
        </div>
        <button onclick="MainApp.openCheckoutModal()" class="w-full bg-green-600 text-white font-black py-4 rounded-[16px] text-lg">💳 BAYAR SEKARANG</button>
      </div>
    </div>
  </div>

  <!-- CHECKOUT MODAL -->
  <div id="checkout-modal" class="fixed inset-0 bg-black/70 z-[200] hidden flex-col items-center justify-end sm:justify-center p-0 sm:p-4">
    <div class="bg-white rounded-t-[24px] sm:rounded-[24px] w-full max-w-lg max-h-[95vh] flex flex-col pb-6 sm:pb-0">
      <div class="bg-blue-700 p-4 text-white flex justify-between items-center rounded-t-[24px] sm:rounded-t-[24px]">
        <h2 class="text-lg font-black">💳 Proses Pembayaran</h2>
        <button onclick="MainApp.closeCheckoutModal()" class="text-white text-2xl font-bold w-8 h-8 bg-white/20 rounded-full">&times;</button>
      </div>
      <div class="p-4 flex-1 overflow-y-auto">
        <div class="bg-blue-50 border-2 border-blue-200 p-4 rounded-2xl text-center mb-4">
          <p class="text-xs font-bold text-gray-500 uppercase">Total Tagihan</p>
          <p class="text-3xl font-black text-blue-700" id="checkout-total">Rp 0</p>
        </div>
        
        <div class="mb-4">
          <p class="text-xs font-bold text-gray-500 uppercase mb-2">Diskon (Opsional)</p>
          <input type="number" id="input-discount" placeholder="Nominal Diskon (Rp)" class="w-full p-4 border-2 border-gray-200 rounded-xl outline-none" oninput="MainApp.calculateChange()">
        </div>

        <div class="mb-4">
          <p class="text-xs font-bold text-gray-500 uppercase mb-2">Uang Diterima (Rp)</p>
          <div class="grid grid-cols-3 gap-2 mb-3">
             <button onclick="MainApp.addAmountPaid(10000)" class="bg-white border-2 border-gray-200 rounded-xl text-sm font-black text-gray-700">+10 Ribu</button>
             <button onclick="MainApp.addAmountPaid(20000)" class="bg-white border-2 border-gray-200 rounded-xl text-sm font-black text-gray-700">+20 Ribu</button>
             <button onclick="MainApp.addAmountPaid(50000)" class="bg-white border-2 border-gray-200 rounded-xl text-sm font-black text-gray-700">+50 Ribu</button>
          </div>
          <button onclick="MainApp.setAmountPas()" class="w-full bg-blue-800 text-white font-black py-3 rounded-xl mb-2 text-sm">💯 UANG PAS</button>
          <input type="number" id="input-amount" placeholder="Input otomatis..." class="w-full p-4 border-2 border-gray-200 rounded-xl outline-none font-bold text-xl" oninput="MainApp.calculateChange()">
        </div>

        <div class="mb-4">
           <p class="text-xs font-bold text-gray-500 uppercase mb-2">Catatan Pesanan (Pelanggan)</p>
           <input type="text" id="input-note" placeholder="Misal: Bu Sari..." class="w-full p-4 border-2 border-gray-200 rounded-xl outline-none">
        </div>

        <div class="bg-green-50 border-2 border-green-200 p-4 rounded-2xl text-center">
          <p class="text-xs font-bold text-green-700 uppercase">Kembalian</p>
          <p class="text-2xl font-black text-green-700" id="checkout-change">Rp 0</p>
        </div>
      </div>
      <div class="p-4 border-t bg-gray-50">
        <button onclick="MainApp.processPayment()" class="w-full bg-green-600 text-white font-black py-4 rounded-[16px] text-lg shadow-lg">✅ KONFIRMASI BAYAR</button>
      </div>
    </div>
  </div>

  <div id="product-modal" class="fixed inset-0 bg-black/70 z-[200] hidden flex-col items-center justify-end sm:justify-center p-0 sm:p-4">
     <div class="bg-white rounded-t-[24px] sm:rounded-[24px] w-full max-w-lg max-h-[90vh] flex flex-col pb-6 sm:pb-0">
        <div class="bg-blue-700 p-4 text-white flex justify-between items-center">
           <h2 class="text-lg font-black" id="prod-modal-title">📦 Detail Barang</h2>
           <button onclick="MainApp.closeAddProduct()" class="text-white text-2xl font-bold w-8 h-8 focus:outline-none">&times;</button>
        </div>
        <div class="p-5 overflow-y-auto space-y-4">
           <input type="hidden" id="prod-id">
           <div>
              <label class="text-xs font-bold text-gray-500 uppercase">Nama Barang</label>
              <input type="text" id="prod-name" class="w-full p-4 border-2 border-gray-200 rounded-xl block mt-1" placeholder="Cth: Minyak Goreng">
           </div>
           <div>
              <label class="text-xs font-bold text-gray-500 uppercase">Barcode</label>
              <input type="text" id="prod-barcode" class="w-full p-4 border-2 border-gray-200 rounded-xl block mt-1" placeholder="Scan Barcode (Opsional)">
           </div>
           <div class="grid grid-cols-2 gap-3">
              <div>
                 <label class="text-xs font-bold text-gray-500 uppercase">Harga (Rp)</label>
                 <input type="number" id="prod-price" class="w-full p-4 border-2 border-gray-200 rounded-xl block mt-1" placeholder="Ketik Harga">
              </div>
              <div>
                 <label class="text-xs font-bold text-gray-500 uppercase">Stok (Pcs)</label>
                 <input type="number" id="prod-stock" class="w-full p-4 border-2 border-gray-200 rounded-xl block mt-1" placeholder="Stok tersedia">
              </div>
           </div>
           <div>
              <label class="text-xs font-bold text-gray-500 uppercase">Kategori</label>
              <select id="prod-cat" class="w-full p-4 border-2 border-gray-200 rounded-xl block mt-1">
                 <option>Sembako</option><option>Snack</option><option>Minuman</option><option>Umum</option>
              </select>
           </div>
           <div>
              <label class="text-xs font-bold text-gray-500 uppercase">Catatan / Keterangan</label>
              <input type="text" id="prod-note" class="w-full p-4 border-2 border-gray-200 rounded-xl block mt-1 mb-8" placeholder="Cth: Rak Kanan, Expired Desember">
           </div>
        </div>
        <div class="p-4 border-t bg-gray-50 flex gap-2">
           <button onclick="MainApp.saveProduct()" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-xl">💾 SIMPAN</button>
           <button id="prod-del-btn" onclick="MainApp.deleteProduct()" class="bg-red-100 text-red-600 font-black px-5 rounded-xl hidden">🗑️</button>
        </div>
     </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <button onclick="navigate('dashboard')" id="nav-dashboard" class="active">
      <span class="icon">🏠</span><span class="label">Beranda</span>
    </button>
    <button onclick="navigate('kasir')" id="nav-kasir">
      <span class="icon">💻</span><span class="label">Kasir</span>
    </button>
    <button onclick="navigate('barang')" id="nav-barang">
      <span class="icon">📦</span><span class="label">Barang</span>
    </button>
  </nav>

  <script type="module" src="/src/main.js"></script>
  <script>
    function navigate(view) {
      document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
      document.querySelectorAll('.bottom-nav button').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + view).classList.add('active');
      
      // Hook events
      if(view === 'kasir') window.MainApp?.loadKasirProducts();
      if(view === 'barang') window.MainApp?.loadProducts();
      if(view === 'dashboard') window.MainApp?.loadDashboard();
      
      // Hide cart drawer logic
      if(view !== 'kasir') document.getElementById('cart-drawer').classList.add('hidden');
    }
    
    // Auto load date
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  </script>
</body>
</html>
